name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build static site bundle
        if: github.event_name != 'pull_request' || github.event.action != 'closed'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p _site
          shopt -s nullglob
          html_files=( *.html )
          if [ "${#html_files[@]}" -eq 0 ]; then
            echo "No HTML files found at repository root."
            exit 1
          fi
          cp "${html_files[@]}" _site/
          cp styles.css robots.txt _site/
          cp -R assets _site/assets
          touch _site/.nojekyll

      - name: Publish to gh-pages branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          REF_NAME: ${{ github.ref_name }}
          WORKSPACE: ${{ github.workspace }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_dir="$(mktemp -d)"
          cd "$publish_dir"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"

          if git fetch --depth=1 origin gh-pages; then
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
          fi

          touch .nojekyll

          ensure_root_site() {
            if [ -f index.html ]; then
              return
            fi

            bootstrap_dir="$(mktemp -d)"
            mapfile -t root_html_files < <(
              git --git-dir="$WORKSPACE/.git" ls-tree --name-only "origin/${DEFAULT_BRANCH}" | grep -E '\.html$' || true
            )
            if [ "${#root_html_files[@]}" -eq 0 ]; then
              echo "No HTML files found on origin/${DEFAULT_BRANCH}."
              exit 1
            fi
            git --git-dir="$WORKSPACE/.git" --work-tree="$bootstrap_dir" checkout "origin/${DEFAULT_BRANCH}" -- "${root_html_files[@]}" styles.css robots.txt assets
            cp -R "$bootstrap_dir/." .
            touch .nojekyll
          }

          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            find . -mindepth 1 -maxdepth 1 ! -name .git ! -name pr-preview -exec rm -rf {} +
            cp -R "$WORKSPACE/_site/." .
            commit_message="Deploy site from ${REF_NAME}"
          elif [ "$EVENT_ACTION" = "closed" ]; then
            ensure_root_site
            rm -rf "pr-preview/pr-${PR_NUMBER}"
            commit_message="Remove PR preview #${PR_NUMBER}"
          else
            ensure_root_site
            preview_dir="pr-preview/pr-${PR_NUMBER}"
            rm -rf "$preview_dir"
            mkdir -p "$preview_dir"
            cp -R "$WORKSPACE/_site/." "$preview_dir/"
            commit_message="Deploy PR preview #${PR_NUMBER}"
          fi

          if git status --short | grep .; then
            git add -A
            git commit -m "$commit_message"

            for attempt in 1 2 3; do
              if git push origin gh-pages; then
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after ${attempt} attempts."
                exit 1
              fi

              git fetch --depth=1 origin gh-pages
              git rebase FETCH_HEAD
            done
          else
            echo "No publishable changes detected."
          fi

      - name: Comment preview URL on pull request
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner.toLowerCase();
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const marker = '<!-- gh-pages-preview -->';
            const previewUrl = `https://${owner}.github.io/${repo}/pr-preview/pr-${prNumber}/`;
            const body = `${marker}\nPreview deployed: ${previewUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const existing = comments.find((comment) => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
